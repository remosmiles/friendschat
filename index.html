<div id="player-id">
    IDENTIFIZIERE... 
    <span id="opponent-status" style="margin-left:10px; font-size: 0.7rem;">
        GEGNER: <span id="status-dot" style="color: grey;">● OFFLINE</span>
    </span>
</div>

<style>
    .winner-glow { box-shadow: 0 0 50px gold !important; border-color: gold !important; }
    .loser-glow { box-shadow: 0 0 50px red !important; border-color: red !important; }
    #overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column;
        align-items: center; justify-content: center; font-size: 3rem; text-shadow: 0 0 20px white;
    }
</style>

<div id="overlay"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    // ... (Deine Firebase Config bleibt gleich)
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- ONLINE STATUS LOGIK ---
    const myStatusRef = ref(db, `status/${mySymbol}`);
    
    // Setze mich auf Online, wenn ich die Seite lade
    set(myStatusRef, { online: true, name: userName });
    
    // Wenn ich den Tab schließe, setze mich automatisch offline
    onDisconnect(myStatusRef).remove();

    // Den Status des Gegners überwachen
    const opponentSymbol = mySymbol === "X" ? "O" : "X";
    onValue(ref(db, `status/${opponentSymbol}`), (snap) => {
        const dot = document.getElementById("status-dot");
        if (snap.exists() && snap.val().online) {
            dot.innerText = "● ONLINE";
            dot.style.color = "var(--matrix-green)";
            dot.style.textShadow = "0 0 10px var(--matrix-green)";
        } else {
            dot.innerText = "● OFFLINE";
            dot.style.color = "grey";
            dot.style.textShadow = "none";
        }
    });

    // --- WIN-CHECK LOGIK ---
    function checkWinner(board) {
        const wins = [
            [0,1,2], [3,4,5], [6,7,8], // Horizontal
            [0,3,6], [1,4,7], [2,5,8], // Vertikal
            [0,4,8], [2,4,6]           // Diagonal
        ];
        for (let combo of wins) {
            if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[0]] === board[combo[2]]) {
                return board[combo[0]];
            }
        }
        return null;
    }

    onValue(ref(db, "game"), (snap) => {
        const data = snap.val() || { turn: "X", cells: {} };
        const board = data.cells || {};
        
        // ... (Deine bisherige Zellen-Anzeige)

        const winner = checkWinner(board);
        if (winner) {
            const overlay = document.getElementById("overlay");
            overlay.style.display = "flex";
            if (winner === mySymbol) {
                overlay.innerText = "MISSION ERFOLGREICH: GEWONNEN";
                overlay.style.color = "gold";
            } else {
                overlay.innerText = "SYSTEMFEHLER: VERLOREN";
                overlay.style.color = "red";
            }
            setTimeout(() => { overlay.style.display = "none"; resetGame(); }, 4000);
        }
    });
</script>
