<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Pong Pro - Fixed</title>
    <style>
        :root { --matrix-green: #00ff41; --neon-blue: #00f3ff; --neon-pink: #ff00ff; }
        body { font-family: 'Courier New', monospace; margin: 0; background: black; color: var(--matrix-green); display: flex; height: 100vh; overflow: hidden; }
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }
        #chat-section { width: 320px; background: rgba(0, 15, 0, 0.9); border-right: 1px solid var(--matrix-green); display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 0.8rem; }
        .msg { border: 1px solid rgba(0, 255, 65, 0.2); padding: 5px; background: rgba(0, 20, 0, 0.6); }
        #input-area { padding: 10px; border-top: 1px solid var(--matrix-green); display: flex; }
        input { flex: 1; background: #000; border: 1px solid var(--matrix-green); color: var(--matrix-green); padding: 8px; outline: none; }
        #game-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas#pong-canvas { border: 2px solid var(--matrix-green); background: #000; cursor: none; }
        #status { margin-bottom: 10px; text-align: center; }
        button { background: none; border: 1px solid var(--matrix-green); color: var(--matrix-green); cursor: pointer; padding: 5px 10px; font-family: inherit; }
        button:hover { background: var(--matrix-green); color: black; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="chat-section">
    <div style="padding:10px; border-bottom:1px solid var(--matrix-green); font-weight:bold;">> TERMINAL_COMM</div>
    <div id="messages"></div>
    <div id="input-area"><input type="text" id="msgInput" placeholder="Message..." autocomplete="off"></div>
</div>

<div id="game-section">
    <div id="status">
        <div id="player-id">Lade System...</div>
        <h2 id="score">0 : 0</h2>
    </div>
    <canvas id="pong-canvas" width="600" height="400"></canvas>
    <button onclick="location.reload()">RE-SYNC SYSTEM</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, onValue, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLFkWGvGxakLSoX8Vqh8qCunuzpwMOCfk",
        authDomain: "challenge-e77d2.firebaseapp.com",
        databaseURL: "https://challenge-e77d2-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "challenge-e77d2",
        storageBucket: "challenge-e77d2.firebasestorage.app",
        messagingSenderId: "1059790573258",
        appId: "1:1059790573258:web:00d1976d024c549406ee33"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- IDENTITY ---
    let mySide = sessionStorage.getItem("mySide") || prompt("Wähle Seite: L (Links) oder R (Rechts)").toUpperCase();
    if (mySide !== "L" && mySide !== "R") mySide = "L";
    sessionStorage.setItem("mySide", mySide);
    document.getElementById("player-id").innerText = `OPERATOR: [SIDE_${mySide}]`;

    // --- MATRIX BG ---
    const mC = document.getElementById('matrix-canvas');
    const mCtx = mC.getContext('2d');
    mC.width = window.innerWidth; mC.height = window.innerHeight;
    const drops = Array(Math.floor(mC.width/16)).fill(1);
    function drawM() {
        mCtx.fillStyle = "rgba(0,0,0,0.05)"; mCtx.fillRect(0,0,mC.width,mC.height);
        mCtx.fillStyle = "#0F0"; mCtx.font = "16px arial";
        drops.forEach((y, i) => {
            mCtx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*16, y*16);
            if(y*16 > mC.height && Math.random() > 0.9) drops[i] = 0; drops[i]++;
        });
    }
    setInterval(drawM, 40);

    // --- CHAT ---
    const msgI = document.getElementById("msgInput");
    msgI.addEventListener("keypress", (e) => {
        if(e.key === "Enter" && msgI.value) {
            push(ref(db, "chat"), { s: mySide, t: msgI.value });
            msgI.value = "";
        }
    });
    onChildAdded(ref(db, "chat"), (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<span style="color:${d.s==='L'?'#00f3ff':'#ff00ff'}">${d.s}:</span> ${d.t}`;
        document.getElementById("messages").appendChild(div);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });

    // --- PONG ENGINE ---
    const canvas = document.getElementById("pong-canvas");
    const ctx = canvas.getContext("2d");
    
    // Maussteuerung für das Paddle
    canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const y = e.clientY - rect.top;
        set(ref(db, `pong/paddles/${mySide}`), y);
    });

    // Darstellung (für beide Spieler)
    onValue(ref(db, "pong"), (snap) => {
        const data = snap.val() || {};
        const ball = data.ball || { x: 300, y: 200 };
        const p = data.paddles || { L: 200, R: 200 };
        const s = data.score || { L: 0, R: 0 };

        document.getElementById("score").innerText = `${s.L} : ${s.R}`;

        ctx.clearRect(0,0,600,400);
        // Paddles
        ctx.fillStyle = "#00f3ff"; ctx.fillRect(10, p.L - 40, 10, 80);
        ctx.fillStyle = "#ff00ff"; ctx.fillRect(580, p.R - 40, 10, 80);
        // Ball
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
    });

    // BALL-MOTOR (Nur Spieler L berechnet!)
    if (mySide === "L") {
        let bx = 300, by = 200, dx = 5, dy = 3;
        let sl = 0, sr = 0;

        setInterval(async () => {
            bx += dx; by += dy;

            // Wand-Kollision
            if (by < 10 || by > 390) dy *= -1;

            // Paddle-Kollision
            const pSnap = await get(ref(db, "pong/paddles"));
            const p = pSnap.val() || { L: 200, R: 200 };

            if (bx < 30 && by > p.L - 45 && by < p.L + 45) dx = Math.abs(dx);
            if (bx > 570 && by > p.R - 45 && by < p.R + 45) dx = -Math.abs(dx);

            // Punkt erzielt
            if (bx < 0) { sr++; bx = 300; by = 200; dx = 5; set(ref(db, "pong/score"), { L: sl, R: sr }); }
            if (bx > 600) { sl++; bx = 300; by = 200; dx = -5; set(ref(db, "pong/score"), { L: sl, R: sr }); }

            set(ref(db, "pong/ball"), { x: bx, y: by });
        }, 30);
    }
</script>
</body>
</html>
