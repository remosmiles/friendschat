<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Terminal v2.0</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --glass: rgba(0, 20, 0, 0.85);
        }

        body { 
            font-family: 'Courier New', monospace; 
            margin: 0; background: black; color: var(--matrix-green);
            overflow: hidden; display: flex; height: 100vh;
        }

        /* Hintergrund Matrix Regen */
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        /* Links: Chat */
        #chat-section { 
            width: 380px; background: var(--glass); border-right: 1px solid var(--matrix-green);
            display: flex; flex-direction: column; box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }
        
        #chat-header { padding: 15px; border-bottom: 1px solid var(--matrix-green); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { border: 1px solid rgba(0, 255, 65, 0.3); padding: 8px; border-radius: 4px; background: rgba(0, 30, 0, 0.4); font-size: 0.85rem; }

        #input-area { padding: 15px; background: rgba(0,0,0,0.5); display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #000; border: 1px solid var(--matrix-green); color: var(--matrix-green); outline: none; }

        /* Rechts: Game */
        #game-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #status-bar { position: absolute; top: 20px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 110px); gap: 15px; margin-top: 20px; }
        .cell { 
            width: 110px; height: 110px; border: 2px solid var(--matrix-green);
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; cursor: pointer; transition: 0.2s; background: rgba(0,0,0,0.6);
        }
        .cell:hover { background: rgba(0, 255, 65, 0.1); box-shadow: 0 0 15px var(--matrix-green); }
        .cell.x-mark { color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
        .cell.o-mark { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }

        /* Overlay */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column;
            align-items: center; justify-content: center; font-size: 2.5rem; text-align: center;
        }

        button { cursor: pointer; background: none; border: 1px solid var(--matrix-green); color: var(--matrix-green); padding: 5px 10px; font-family: inherit; }
        button:hover { background: var(--matrix-green); color: black; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="chat-section">
    <div id="chat-header">
        <span>> SYSTEM_LOG</span>
        <button onclick="clearChat()">PURGE</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Enter message..." autocomplete="off">
    </div>
</div>

<div id="game-section">
    <div id="status-bar">
        <div id="player-info">IDENTIFYING...</div>
        <div id="opponent-info" style="font-size: 0.8rem; margin-top: 5px;">GEGNER: <span id="status-dot">CHECKING...</span></div>
        <h2 id="turn-display" style="margin-top: 20px; color: gold;">WARTE...</h2>
    </div>
    
    <div class="grid" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>
    <button onclick="resetGame()" style="margin-top: 30px;">REBOOT GAME</button>
</div>

<div id="overlay"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLFkWGvGxakLSoX8Vqh8qCunuzpwMOCfk",
        authDomain: "challenge-e77d2.firebaseapp.com",
        databaseURL: "https://challenge-e77d2-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "challenge-e77d2",
        storageBucket: "challenge-e77d2.firebasestorage.app",
        messagingSenderId: "1059790573258",
        appId: "1:1059790573258:web:00d1976d024c549406ee33"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- IDENTITY SYSTEM ---
    let userName = localStorage.getItem("userName") || prompt("Dein Hacker-Name:") || "User_" + Math.floor(Math.random()*1000);
    localStorage.setItem("userName", userName);

    let mySymbol = sessionStorage.getItem("mySymbol");
    if(!mySymbol) {
        mySymbol = prompt("Wähle dein Symbol (X oder O):").toUpperCase();
        if(mySymbol !== "X" && mySymbol !== "O") mySymbol = "X";
        sessionStorage.setItem("mySymbol", mySymbol);
    }
    document.getElementById("player-info").innerText = `OPERATOR: ${userName} [${mySymbol}]`;

    // --- MATRIX BACKGROUND ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px arial";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 33);

    // --- PRESENCE SYSTEM (Wer ist online?) ---
    const myStatusRef = ref(db, `status/${mySymbol}`);
    set(myStatusRef, { online: true, name: userName });
    onDisconnect(myStatusRef).remove();

    const opponentSymbol = mySymbol === "X" ? "O" : "X";
    onValue(ref(db, `status/${opponentSymbol}`), (snap) => {
        const dot = document.getElementById("status-dot");
        if (snap.exists()) {
            dot.innerText = "ONLINE"; dot.style.color = "var(--matrix-green)";
        } else {
            dot.innerText = "OFFLINE"; dot.style.color = "red";
        }
    });

    // --- CHAT LOGIK ---
    const msgInput = document.getElementById("msgInput");
    msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && msgInput.value) {
            push(ref(db, "chat"), { sender: userName, text: msgInput.value, symbol: mySymbol });
            msgInput.value = "";
        }
    });

    onChildAdded(ref(db, "chat"), (snap) => {
        const val = snap.val();
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<span style="color:${val.symbol === 'X' ? 'var(--neon-blue)' : 'var(--neon-pink)'}">${val.sender}:</span> ${val.text}`;
        document.getElementById("messages").appendChild(div);
        document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
    });

    window.clearChat = () => { if(confirm("Protokolle löschen?")) remove(ref(db, "chat")); };
    onValue(ref(db, "chat"), (snap) => { if(!snap.exists()) document.getElementById("messages").innerHTML = ""; });

    // --- GAME LOGIK ---
    const cells = document.querySelectorAll('.cell');
    
    onValue(ref(db, "game"), (snap) => {
        const data = snap.val() || { turn: "X", cells: {} };
        const board = data.cells || {};
        const turn = data.turn || "X";

        document.getElementById("turn-display").innerText = (turn === mySymbol) ? ">> DEIN ZUG <<" : "WARTE AUF GEGNER...";
        document.getElementById("turn-display").style.color = (turn === mySymbol) ? "var(--matrix-green)" : "gold";

        cells.forEach((cell, i) => {
            const val = board[i] || "";
            cell.innerText = val;
            cell.className = `cell ${val === "X" ? "x-mark" : val === "O" ? "o-mark" : ""}`;
        });

        // Win Check
        const winner = checkWinner(Object.values(board).length >= 5 ? board : {});
        if(winner) showOverlay(winner);
    });

    cells.forEach(cell => {
        cell.onclick = () => {
            onValue(ref(db, "game"), (snap) => {
                const data = snap.val() || { turn: "X", cells: {} };
                if(data.turn === mySymbol && !data.cells[cell.dataset.index]) {
                    set(ref(db, `game/cells/${cell.dataset.index}`), mySymbol);
                    set(ref(db, "game/turn"), mySymbol === "X" ? "O" : "X");
                }
            }, { onlyOnce: true });
        };
    });

    function checkWinner(b) {
        const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let c of w) if(b[c[0]] && b[c[0]]==b[c[1]] && b[c[0]]==b[c[2]]) return b[c[0]];
        return null;
    }

    function showOverlay(w) {
        const o = document.getElementById("overlay");
        o.style.display = "flex";
        o.innerHTML = w === mySymbol ? "<h1 style='color:gold'>MISSION ERFOLGREICH</h1>" : "<h1 style='color:red'>SYSTEMFEHLER: NIEDERLAGE</h1>";
        setTimeout(() => { o.style.display="none"; resetGame(); }, 3000);
    }

    window.resetGame = () => { remove(ref(db, "game")); set(ref(db, "game/turn"), "X"); };
</script>
</body>
</html>
